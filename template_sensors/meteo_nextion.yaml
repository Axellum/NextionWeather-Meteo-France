#---------------------------------------- Alertes meteo probabilitées -----------------------------------------------------------------------------------

- name: alerte_coul
  state: >-
    {{ {'Vert': 35, 'Jaune': 36, 'Orange': 37, 'Rouge': 38}.get(states('sensor.40_weather_alert'), 34) }}

- name: alerte_gel
  state: >-
    {% set alert = states('sensor.saint_vincent_de_tyrosse_freeze_chance') | float(0) %}
    {% if alert < 5 %} 91
    {% elif alert < 50 %} 92
    {% elif alert < 90 %} 93
    {% elif alert <= 100 %} 94
    {% else %} 95 {% endif %}

- name: alerte_neige
  state: >-
    {% set alert = states('sensor.saint_vincent_de_tyrosse_snow_chance') | float(0) %}
    {% if alert < 5 %} 87
    {% elif alert < 50 %} 88
    {% elif alert < 90 %} 89
    {% elif alert <= 100 %} 90
    {% else %} 95 {% endif %}

- name: alerte_rain
  state: >-
    {% set alert = states('sensor.saint_vincent_de_tyrosse_rain_chance') | float(0) %}
    {% if alert < 9 %} 80
    {% elif alert < 40 %} 79
    {% elif alert < 70 %} 78
    {% elif alert <= 100 %} 77
    {% else %} 80 {% endif %}

- name: uv_prob
  state: >-
    {% set alert = states('sensor.saint_vincent_de_tyrosse_uv') | float(0) %}
    {% if alert < 5 %} 85
    {% elif alert < 7 %} 84
    {% elif alert < 9 %} 83
    {% elif alert < 11 %} 82
    {% else %} 81 {% endif %}
