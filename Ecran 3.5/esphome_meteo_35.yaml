esphome:
  name: meteo35

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: arduino

# Enable logging
logger:
  baud_rate: 0 # Disable UART logging (pins GPIO1/3 are used for Nextion communication)
  level: VERY_VERBOSE

# Enable Home Assistant API
api:

ota:
  password: "****"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

uart:
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200
  rx_buffer_size: 2048

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris
    on_time:
      - seconds: 0
        minutes: "*"
        then:
          - lambda: |-
              auto time = id(sntp_time).now();
              id(teplomer).set_component_text_printf("p[0].heure","%02d",time.hour);
              id(teplomer).set_component_text_printf("p[0].minute","%02d",time.minute);
globals:
  - id: display_on
    type: bool

#----- Récupération des données à afficher-----------------------
#-------------------------- sensor -----
binary_sensor:

